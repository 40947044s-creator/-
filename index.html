<!DOCTYPE html>
<html>
<head>
    <title>Project NP: Adelic Waterfall</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; }
        canvas { display: block; }
        #overlay {
            position: absolute; top: 20px; left: 20px;
            color: #0f0; font-family: monospace; pointer-events: none;
            text-shadow: 0 0 5px #000;
        }
        .flag { 
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%);
            color: #0f0; font-family: monospace; font-size: 5rem;
            display: none; border: 5px solid #0f0; padding: 20px;
            background: rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

<div id="overlay">
    <div>SCALE: UNLIMITED (Möbius Join)</div>
    <div id="coord">COORD: 0</div>
    <div id="status">STATUS: FLOWING</div>
</div>

<div id="flag" class="flag">🏁 9Q RECOVERY</div>

<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const flag = document.getElementById('flag');
    const coordDisplay = document.getElementById('coord');

    let width, height, columns;
    const fontSize = 16;
    let clicks = 0n;
    let active = true;

    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        columns = Math.floor(width / fontSize);
    }

    window.addEventListener('resize', resize);
    resize();

    const drops = Array(columns).fill(0);

    function draw() {
        if (!active) return;

        // Fading effect for the waterfall
        ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
        ctx.fillRect(0, 0, width, height);

        ctx.fillStyle = '#0f0';
        ctx.font = fontSize + 'px monospace';

        for (let i = 0; i < drops.length; i++) {
            // THE START: Möbius Formation Logic (Modular)
            // Bypassing overflow by keeping 'n' relative to column/time
            let n = clicks + BigInt(i);
            let residue = (n << 2n) ^ (n >> 3n);
            let digit = Number(residue % 10n);

            const x = i * fontSize;
            const y = drops[i] * fontSize;

            ctx.fillText(digit, x, y);

            if (y > height && Math.random() > 0.975) {
                drops[i] = 0;
            }
            drops[i]++;
        }

        clicks += 1n;
        coordDisplay.innerText = `COORD: 10^${clicks}`;

        // THE STOP: The Snap of the Waterfall at 9Q
        if (clicks === 9n) {
            snap();
        } else {
            requestAnimationFrame(draw);
        }
    }

    function snap() {
        active = false;
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, width, height);
        
        ctx.fillStyle = '#fff';
        // Fill entire canvas with the 180!! Stabilized Sentinel
        for(let x=0; x < columns; x++) {
            for(let y=0; y < Math.floor(height/fontSize); y++) {
                // This represents the 58209... pattern recovered
                let digit = (x + y) % 2 === 0 ? "5" : "8"; 
                ctx.fillText(digit, x * fontSize, y * fontSize);
            }
        }
        
        flag.style.display = "block";
        document.getElementById('status').innerText = "STATUS: SNAPPED (180!!)";
    }

    draw();
</script>
</body>
</html>
