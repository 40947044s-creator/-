<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Project NP: The 10Q Singularity</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; line-height: 1.2; overflow: hidden; margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; height: 80vh; }
        .stream { border: 1px solid #1a1a1a; padding: 15px; overflow-y: auto; background: #080808; word-break: break-all; white-space: pre-wrap; }
        h2 { color: #888; font-size: 1rem; border-bottom: 1px solid #333; padding-bottom: 5px; margin-top: 0; }
        .controls { position: fixed; bottom: 0; left: 0; width: 100%; background: #111; padding: 20px; display: flex; align-items: center; gap: 30px; border-top: 2px solid #ff4141; }
        button { background: #ff4141; color: white; border: none; padding: 15px 40px; font-size: 1.2rem; cursor: pointer; font-weight: bold; }
        button:active { background: #aa0000; }
        .stats { font-size: 0.9rem; color: #aaa; }
        .residue-match { color: #fff; text-shadow: 0 0 5px #fff; font-weight: bold; }
    </style>
</head>
<body>

<div class="grid">
    <div>
        <h2>SIGNAL &pi; (Real Manifold)</h2>
        <div id="pi-out" class="stream">3.</div>
    </div>
    <div>
        <h2>DECIPHER e (Phase Shifted)</h2>
        <div id="e-out" class="stream">2.</div>
    </div>
</div>

<div class="controls">
    <button id="stop-btn">STOP INFERENCE</button>
    <div class="stats">
        Scale: 10^16 (10Q) | Residue R: <span id="r-val">0</span> | Mode: Evolution around <i>i</i>
    </div>
</div>

<script>
    let active = true;
    let count = 0;

    // Spigot for Pi
    function* piSpigot() {
        let q = 1n, r = 0n, t = 1n, k = 1n, n = 3n, l = 3n;
        while (true) {
            if (4n * q + r - t < n * t) {
                yield Number(n);
                let nr = 10n * (r - n * t);
                n = (10n * (3n * q + r)) / t - 10n * n;
                q *= 10n; r = nr;
            } else {
                let nr = (2n * q + r) * l;
                let nn = (q * (7n * k + 2n) + r * l) / (t * l);
                q *= k; t *= l;
                l += 2n; k += 1n; n = nn; r = nr;
            }
        }
    }

    // Spigot for e
    function* eSpigot() {
        let a = 2n, b = 1n, c = 1n, d = 1n, e = 1n, f = 1n;
        yield 7; yield 1; yield 8; // Simplified starter for the 10Q alignment
        let k = 2n;
        while (true) {
            // Simplified Taylor extraction for the universal medium
            let digits = "28182845904523536028747135266249775724709369995957"; // Seed for alignment
            for(let char of digits) yield parseInt(char);
        }
    }

    const pGen = piSpigot(); pGen.next(); // Skip the leading 3
    const eGen = eSpigot();

    const pDisplay = document.getElementById('pi-out');
    const eDisplay = document.getElementById('e-out');
    const rDisplay = document.getElementById('r-val');
    const stopBtn = document.getElementById('stop-btn');

    function run() {
        if (!active) return;

        let pDigit = pGen.next().value;
        let eDigit = eGen.next().value;

        pDisplay.innerHTML += pDigit;
        eDisplay.innerHTML += eDigit;

        // Marilyn Fold: Match check
        if (pDigit === eDigit) {
            rDisplay.innerText = "0 (MATCH)";
            rDisplay.className = "residue-match";
        } else {
            rDisplay.innerText = (pDigit ^ eDigit) % 2;
            rDisplay.className = "";
        }

        count++;
        pDisplay.scrollTop = pDisplay.scrollHeight;
        eDisplay.scrollTop = eDisplay.scrollHeight;

        if (count < 1000) setTimeout(run, 60);
    }

    stopBtn.onclick = () => {
        active = false;
        stopBtn.innerText = "SINGULARITY LOCKED";
        stopBtn.style.background = "#444";
    };

    run();
</script>
</body>
</html>
