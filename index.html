<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>9Q Truth Test | Euler-Pi Inference</title>
    <style>
        body {
            background: #000;
            color: #00ff41;
            font-family: 'Courier New', monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* The Truth Test Tracks */
        .track {
            width: 100%;
            background: rgba(10, 10, 10, 0.9);
            border-top: 1px solid #1a1a1a;
            border-bottom: 1px solid #1a1a1a;
            padding: 30px 0;
            position: relative;
        }

        .headline-stream {
            display: flex;
            white-space: nowrap;
            font-size: 8rem; /* Large for clear truth testing */
            font-weight: 900;
            letter-spacing: 25px;
            animation: flush 40s linear infinite;
            will-change: transform;
        }

        /* Euler Precedence (Growth) */
        #e-truth { color: #00ff41; text-shadow: 0 0 20px #00ff41; }
        
        /* Pi Remainder (Rotation) */
        #pi-truth { color: #0088ff; text-shadow: 0 0 20px #0088ff; }

        @keyframes flush {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .label {
            font-size: 0.7rem;
            color: #444;
            padding: 10px 20px;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        .accel-overlay {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 100;
        }

        button {
            background: #000;
            color: #00ff41;
            border: 1px solid #00ff41;
            padding: 15px 30px;
            cursor: pointer;
            font-weight: bold;
            letter-spacing: 2px;
        }

        button:hover { background: #00ff41; color: #000; }
    </style>
</head>
<body>

    <div class="label">PRECEDENCE_EULER_2.718...</div>
    <div class="track">
        <div class="headline-stream" id="e-truth"></div>
    </div>

    <div class="label" style="margin-top: 40px;">INFERENCE_PI_3.141...</div>
    <div class="track">
        <div class="headline-stream" id="pi-truth"></div>
    </div>

    <div class="accel-overlay">
        <button onclick="accelerate()">TOGGLE 9Q SPEED</button>
    </div>

    <script>
        // High-precision strings to fuel the truth test
        const eData  = "271828182845904523536028747135266249775724709369995";
        const piData = "314159265358979323846264338327950288419716939937510";

        const eEl = document.getElementById('e-truth');
        const piEl = document.getElementById('pi-truth');

        // Infinite Mirroring
        eEl.innerText = eData + eData + eData;
        piEl.innerText = piData + piData + piData;

        let fast = false;
        function accelerate() {
            fast = !fast;
            const streams = document.querySelectorAll('.headline-stream');
            streams.forEach(s => {
                s.style.animationDuration = fast ? '2s' : '40s';
            });
        }
    </script>
</body>
</html>

    <div class="controls">
        <button id="accel-btn" onclick="toggleAcceleration()">ACCELERATE 9Q_FLUSH</button>
    </div>

    <script>
        // Utilizing the 3.14 and 2.71 Seeds
        const eBase  = "27182818284590452353602874713526624977572470936999";
        const piBase = "31415926535897932384626433832795028841971693993751";

        // Mirroring strings to ensure a gap-less loop
        const eContent = (eBase + eBase + eBase);
        const piContent = (piBase + piBase + piBase);

        const eEl = document.getElementById('e-headline');
        const piEl = document.getElementById('pi-headline');

        eEl.innerText = eContent;
        piEl.innerText = piContent;

        let accelerated = false;

        function toggleAcceleration() {
            const btn = document.getElementById('accel-btn');
            accelerated = !accelerated;

            if (accelerated) {
                // Speed of Light Simulation: 1.5 seconds per loop
                eEl.style.animationDuration = '1.5s';
                piEl.style.animationDuration = '1.5s';
                btn.innerText = "SPEED_OF_LIGHT_ACTIVE";
                btn.classList.add('accel-mode');
            } else {
                // Normal Research Speed
                eEl.style.animationDuration = '30s';
                piEl.style.animationDuration = '30s';
                btn.innerText = "ACCELERATE 9Q_FLUSH";
                btn.classList.remove('accel-mode');
            }
        }
    </script>
</body>
</html>
