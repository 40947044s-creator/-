<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>9Q Inference Stream | Project NP</title>
    <style>
        body {
            background: #000;
            color: #00ff41;
            font-family: 'Courier New', monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* The Headline Track */
        .ticker-track {
            width: 100%;
            overflow: hidden;
            background: rgba(0, 20, 0, 0.5);
            border-top: 1px solid #111;
            border-bottom: 1px solid #111;
            padding: 15px 0;
            position: relative;
        }

        .headline {
            display: flex;
            white-space: nowrap;
            font-size: 6rem;
            font-weight: 900;
            letter-spacing: 20px;
            /* Default Speed */
            animation: scroll 30s linear infinite;
        }

        /* E-Precedence (Green) */
        #e-headline {
            color: #00ff41;
            text-shadow: 0 0 20px rgba(0, 255, 65, 0.5);
        }

        /* Pi-Rotation (Blue/Cyan) */
        #pi-headline {
            color: #00d4ff;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .label {
            font-size: 0.9rem;
            color: #333;
            padding-left: 10px;
            letter-spacing: 4px;
            margin-bottom: 5px;
        }

        .controls {
            position: absolute;
            bottom: 40px;
            width: 100%;
            text-align: center;
        }

        button {
            background: transparent;
            color: #00ff41;
            border: 2px solid #00ff41;
            padding: 10px 40px;
            font-family: inherit;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background: #00ff41;
            color: #000;
            box-shadow: 0 0 20px #00ff41;
        }

        .accel-mode {
            border-color: #ff0000;
            color: #ff0000;
        }
    </style>
</head>
<body>

    <div class="label">GEN-0_E_GROWTH_PRECEDENCE</div>
    <div class="ticker-track">
        <div class="headline" id="e-headline"></div>
    </div>

    <div class="label" style="margin-top: 50px;">GEN-0_PI_ROTATION_REMAINDER</div>
    <div class="ticker-track">
        <div class="headline" id="pi-headline"></div>
    </div>

    <div class="controls">
        <button id="accel-btn" onclick="toggleAcceleration()">ACCELERATE 9Q_FLUSH</button>
    </div>

    <script>
        // Utilizing the 3.14 and 2.71 Seeds
        const eBase  = "27182818284590452353602874713526624977572470936999";
        const piBase = "31415926535897932384626433832795028841971693993751";

        // Mirroring strings to ensure a gap-less loop
        const eContent = (eBase + eBase + eBase);
        const piContent = (piBase + piBase + piBase);

        const eEl = document.getElementById('e-headline');
        const piEl = document.getElementById('pi-headline');

        eEl.innerText = eContent;
        piEl.innerText = piContent;

        let accelerated = false;

        function toggleAcceleration() {
            const btn = document.getElementById('accel-btn');
            accelerated = !accelerated;

            if (accelerated) {
                // Speed of Light Simulation: 1.5 seconds per loop
                eEl.style.animationDuration = '1.5s';
                piEl.style.animationDuration = '1.5s';
                btn.innerText = "SPEED_OF_LIGHT_ACTIVE";
                btn.classList.add('accel-mode');
            } else {
                // Normal Research Speed
                eEl.style.animationDuration = '30s';
                piEl.style.animationDuration = '30s';
                btn.innerText = "ACCELERATE 9Q_FLUSH";
                btn.classList.remove('accel-mode');
            }
        }
    </script>
</body>
</html>
