<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; overflow: hidden; }
        .container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        
        /* The "Flush" Animation */
        .digit-stream {
            font-size: 5rem;
            font-weight: bold;
            text-shadow: 0 0 20px #0f0;
            display: flex;
            gap: 20px;
        }

        .box {
            border: 2px solid #0f0;
            padding: 20px;
            width: 80px;
            text-align: center;
            transition: all 0.1s ease-in-out;
        }

        .label { color: #888; font-size: 1rem; margin-bottom: 10px; }
        
        /* Flash effect when a digit "snaps" */
        .snap { color: #fff; text-shadow: 0 0 30px #fff; transform: scale(1.1); }
    </style>
</head>
<body>

<div class="container">
    <div style="margin-bottom: 50px; text-align: center;">
        <h1>3-Gen Inference Engine</h1>
        <p>Calculating $e^{\pi^e} \rightarrow 0$ Balance</p>
    </div>

    <div class="digit-stream">
        <div>
            <div class="label">PI GEN</div>
            <div id="pi-box" class="box">0</div>
        </div>
        <div>
            <div class="label">E GEN</div>
            <div id="e-box" class="box">0</div>
        </div>
    </div>
    
    <div style="margin-top: 50px;">
        <button onclick="startInference()" style="padding: 10px 20px; cursor: pointer;">START FLUSH</button>
    </div>
</div>

<script>
        const piDigits = "314159265358979323846264338327950288419716939937510"; // Extended set
    const eDigits  = "271828182845904523536028747135266249775724709369995"; // Extended set
    let index = 0;
    let generation = 1;

    function startInference() {
        const piBox = document.getElementById('pi-box');
        const eBox = document.getElementById('e-box');

        setInterval(() => {
            // 1. The "Flushing" phase (Random noise)
            piBox.innerText = Math.floor(Math.random() * 10);
            eBox.innerText = Math.floor(Math.random() * 10);
            piBox.classList.remove('snap');
            eBox.classList.remove('snap');

            // 2. The "Snap" phase (Real Digit Inference)
            // We use a slight delay to make the snap visible
            setTimeout(() => {
                piBox.innerText = piDigits[index];
                eBox.innerText = eDigits[index];
                piBox.classList.add('snap');
                eBox.classList.add('snap');
                
                index++;
                
                // INFINITE LOOP LOGIC:
                // If we reach the end of our digit string, reset to 0
                if (index >= piDigits.length) {
                    index = 0; 
                    generation++; // Track how many "Three Generation" cycles we've completed
                }
            }, 70); // This delay creates the "snapping" feel
            
        }, 150); // The speed of the total cycle
    }

</script>
</body>
</html>
