<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Project NP | Adelic Witness</title>
    <style>
        :root { --accent: #00ff41; --bg: #000; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--accent); font-family: monospace; overflow: hidden; }
        
        #header { position: absolute; top: 0; width: 100%; padding: 15px; background: rgba(0,0,0,0.95); z-index: 100; border-bottom: 1px solid #111; }
        .info { display: inline-block; margin-right: 40px; }
        .label { color: #555; font-size: 0.7rem; text-transform: uppercase; }
        .value { font-size: 0.9rem; color: var(--accent); }

        #manifold { display: flex; width: 100vw; height: 100vh; }
        .panel { flex: 1; position: relative; border-right: 1px solid #111; }
        canvas { display: block; width: 100%; height: 100%; }

        #controls { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 100; display: flex; gap: 10px; }
        button { background: #000; border: 1px solid var(--accent); color: var(--accent); padding: 10px 25px; cursor: pointer; font-family: inherit; }
        button:hover { background: var(--accent); color: #000; }
        
        .panel-id { position: absolute; top: 80px; left: 20px; font-size: 3rem; opacity: 0.1; pointer-events: none; }
    </style>
</head>
<body>

<div id="header">
    <div class="info"><div class="label">Coordinate Phase</div><div id="coord" class="value">Q^Q + 0</div></div>
    <div class="info"><div class="label">Parity</div><div class="value">180!! STABLE</div></div>
    <div class="info"><div class="label">Observation Mode</div><div id="status" class="value">INFINITE_WITNESS</div></div>
</div>

<div id="manifold">
    <div class="panel"><canvas id="c-pi"></canvas><div class="panel-id">π</div></div>
    <div class="panel"><canvas id="c-e"></canvas><div class="panel-id">e</div></div>
</div>

<div id="controls">
    <button id="snap-btn">SNAP & COPY</button>
    <button id="adv-btn">ADVANCE (SPACE)</button>
</div>

<script>
    const canvasConfig = [
        { id: 'c-pi', pattern: [3, 1, 4, 1, 5, 9, 2, 6, 5, 3] },
        { id: 'c-e', pattern: [2, 7, 1, 8, 2, 8, 1, 8, 2, 8] }
    ];

    let clicks = 0n;
    let active = true;
    const ctxs = [];
    const size = 16;

    function init() {
        canvasConfig.forEach(cfg => {
            const c = document.getElementById(cfg.id);
            const ctx = c.getContext('2d', { alpha: false });
            c.width = c.parentElement.clientWidth;
            c.height = c.parentElement.clientHeight;
            ctxs.push({ ctx, cfg, drops: Array(Math.floor(c.width/size)).fill(0) });
        });
    }

    function getResidue(scale, offset, p) {
        return p[Number((scale + BigInt(offset)) % BigInt(p.length))];
    }

    function flow() {
        if (!active) return;
        ctxs.forEach(obj => {
            obj.ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            obj.ctx.fillRect(0, 0, obj.ctx.canvas.width, obj.ctx.canvas.height);
            obj.ctx.fillStyle = '#0f0';
            obj.ctx.font = size + "px monospace";

            obj.drops.forEach((y, i) => {
                const digit = getResidue(clicks, i + y, obj.cfg.pattern);
                obj.ctx.fillText(digit, i * size, y * size);
                if (y * size > obj.ctx.canvas.height && Math.random() > 0.98) obj.drops[i] = 0;
                obj.drops[i]++;
            });
        });
        clicks += 1n;
        document.getElementById('coord').innerText = `Q^Q + ${clicks}`;
        requestAnimationFrame(flow);
    }

    function snap() {
        active = false;
        ctxs.forEach(obj => {
            obj.ctx.fillStyle = '#fff';
            obj.ctx.fillRect(0, 0, obj.ctx.canvas.width, obj.ctx.canvas.height);
            obj.ctx.fillStyle = '#000';
            obj.ctx.font = `bold ${size}px monospace`;
            for(let x=0; x < obj.ctx.canvas.width/size; x++) {
                for(let y=0; y < obj.ctx.canvas.height/size; y++) {
                    obj.ctx.fillText(getResidue(clicks, x+y, obj.cfg.pattern), x*size, y*size);
                }
            }
        });
        document.getElementById('status').innerText = "AUDIT_PAUSED";
    }

    function advance() {
        active = true;
        document.getElementById('status').innerText = "INFINITE_WITNESS";
        clicks += 100n; // Deeper jump
        flow();
    }

    document.getElementById('snap-btn').onclick = snap;
    document.getElementById('adv-btn').onclick = advance;
    window.onkeydown = (e) => { if(e.code === 'Space') advance(); };
    window.onresize = init;

    init();
    flow();
</script>
</body>
</html>

    function advance() {
        active = true;
        clicks = clicks === 0n ? 9n : clicks * 2n;
        render();

    window.addEventListener('resize', init);

    init();
    render();
</script>
</body>
</html>
