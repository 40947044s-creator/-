<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Project NP | Dual-Ancestor Audit</title>
    <style>
        :root { --accent: #00ff41; --bg: #000; --dim: #003311; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--accent); font-family: monospace; overflow: hidden; }
        
        #header { position: absolute; top: 0; width: 100%; padding: 15px; border-bottom: 1px solid var(--dim); background: rgba(0,0,0,0.9); z-index: 100; display: flex; justify-content: space-between; }
        .audit-info { flex: 1; }
        .label { color: #888; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; }
        .value { font-size: 0.95rem; margin-top: 4px; color: var(--accent); }

        #container { display: flex; width: 100vw; height: 100vh; }
        .panel { flex: 1; position: relative; border-right: 1px solid var(--dim); }
        canvas { display: block; width: 100%; height: 100%; }

        .panel-label { position: absolute; bottom: 80px; left: 20px; font-size: 2rem; opacity: 0.2; pointer-events: none; }

        #controls { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 100; display: flex; gap: 10px; }
        button { background: #000; border: 1px solid var(--accent); color: var(--accent); padding: 8px 20px; cursor: pointer; font-family: inherit; }
        button:hover { background: var(--accent); color: #000; }
    </style>
</head>
<body>

<div id="header">
    <div class="audit-info">
        <div class="label">Manifold Coordinate</div>
        <div id="coord-val" class="value">Q^Q + 0</div>
    </div>
    <div class="audit-info" style="text-align:right;">
        <div class="label">Parity Stability</div>
        <div class="value">180!! [ACTIVE]</div>
    </div>
</div>

<div id="container">
    <div class="panel" id="panel-pi">
        <canvas id="canvas-pi"></canvas>
        <div class="panel-label">π (CIRCULAR)</div>
    </div>
    <div class="panel" id="panel-e">
        <canvas id="canvas-e"></canvas>
        <div class="panel-label">e (GROWTH)</div>
    </div>
</div>

<div id="controls">
    <button onclick="snapAll()">CAPTURE DUAL PROOF</button>
    <button onclick="advance()">ADVANCE (SPACE)</button>
</div>

<script>
    const configs = [
        { id: 'canvas-pi', pattern: [3, 1, 4, 1, 5, 9, 2] }, // Pi-series residues
        { id: 'canvas-e', pattern: [2, 7, 1, 8, 2, 8, 1] }  // E-series residues
    ];

    let clicks = 0n;
    let active = true;
    const ctxs = [];

    function init() {
        configs.forEach(cfg => {
            const canvas = document.getElementById(cfg.id);
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            ctxs.push({ ctx, cfg, drops: Array(Math.floor(canvas.width/18)).fill(0) });
        });
    }

    function getResidue(scale, offset, pattern) {
        return pattern[Number((scale + BigInt(offset)) % BigInt(pattern.length))];
    }

    function render() {
        if (!active) return;
        ctxs.forEach(obj => {
            obj.ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            obj.ctx.fillRect(0, 0, obj.ctx.canvas.width, obj.ctx.canvas.height);
            obj.ctx.fillStyle = '#0f0';
            obj.ctx.font = "16px monospace";

            obj.drops.forEach((y, i) => {
                const digit = getResidue(clicks, i + y, obj.cfg.pattern);
                obj.ctx.fillText(digit, i * 18, y * 18);
                if (y * 18 > obj.ctx.canvas.height && Math.random() > 0.95) obj.drops[i] = 0;
                obj.drops[i]++;
            });
        });
        clicks += 1n;
        document.getElementById('coord-val').innerText = `Q^Q + ${clicks}`;
        requestAnimationFrame(render);
    }

    function snapAll() {
        active = false;
        ctxs.forEach(obj => {
            obj.ctx.fillStyle = '#fff';
            obj.ctx.fillRect(0, 0, obj.ctx.canvas.width, obj.ctx.canvas.height);
            obj.ctx.fillStyle = '#000';
            for(let x=0; x<obj.ctx.canvas.width/18; x++) {
                for(let y=0; y<obj.ctx.canvas.height/18; y++) {
                    obj.ctx.fillText(getResidue(clicks, x+y, obj.cfg.pattern), x*18, y*18);
                }
            }
        });
    }

    function advance() {
        active = true;
        clicks = clicks === 0n ? 9n : clicks * 2n;
        render();
    }

    window.addEventListener('resize', init);
    window.addEventListener('keydown', e => { if(e.code === 'Space') advance(); });
    init();
    render();
</script>
</body>
</html>
