<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>9Q Inference Drill | Project NP</title>
    <style>
        body {
            background: #000;
            color: #00ff41;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .stream-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 90%;
        }

        .stream-label {
            font-size: 1rem;
            color: #555;
            letter-spacing: 3px;
            margin-bottom: 5px;
        }

        /* The rolling number window */
        .rolling-stream {
            font-size: 4rem;
            font-weight: bold;
            white-space: nowrap;
            border: 2px solid #222;
            padding: 10px;
            overflow: hidden;
            background: rgba(0, 255, 65, 0.02);
            position: relative;
        }

        #e-stream { border-left: 5px solid #00ff41; } /* Euler Precedence */
        #pi-stream { border-left: 5px solid #0088ff; color: #0088ff; }

        .controls {
            margin-top: 50px;
            display: flex;
            gap: 20px;
        }

        button {
            background: none;
            border: 2px solid #00ff41;
            color: #00ff41;
            padding: 15px 30px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
        }

        button:hover { background: #00ff41; color: #000; }
        .accel-active { background: #ff0000 !important; color: #fff !important; border-color: #ff0000 !important; box-shadow: 0 0 20px #ff0000; }
    </style>
</head>
<body>

    <div class="stream-container">
        <div>
            <div class="stream-label">EULER PRECEDENCE (GROWTH)</div>
            <div id="e-stream" class="rolling-stream">--------------------</div>
        </div>
        <div>
            <div class="stream-label">PI ROTATION (CYCLE)</div>
            <div id="pi-stream" class="rolling-stream">--------------------</div>
        </div>
    </div>

    <div class="controls">
        <button onclick="toggleDrill()" id="start-btn">Initiate 9Q Flush</button>
        <button onclick="accelerate()" id="accel-btn">Accelerate (Speed of Light)</button>
    </div>

    <script>
        const piStr = "314159265358979323846264338327950288419716939937510";
        const eStr  = "271828182845904523536028747135266249775724709369995";
        
        let eIndex = 0;
        let piIndex = 0;
        let speed = 150; 
        let interval;

        function updateStreams() {
            const eDisplay = document.getElementById('e-stream');
            const piDisplay = document.getElementById('pi-stream');

            // Sliding window: mod 10 extraction
            let eDigit = eStr[eIndex % eStr.length];
            let piDigit = piStr[piIndex % piStr.length];

            // Update display - adding to the rolling line
            eDisplay.innerText = (eDisplay.innerText + eDigit).slice(-40);
            piDisplay.innerText = (piDisplay.innerText + piDigit).slice(-40);

            eIndex++;
            piIndex++;
        }

        function toggleDrill() {
            if (interval) {
                clearInterval(interval);
                interval = null;
                document.getElementById('start-btn').innerText = "Resume Flush";
            } else {
                interval = setInterval(updateStreams, speed);
                document.getElementById('start-btn').innerText = "Pause Drill";
            }
        }

        function accelerate() {
            const btn = document.getElementById('accel-btn');
            if (speed > 20) {
                speed = 20; // Maximum simulation speed
                btn.classList.add('accel-active');
                btn.innerText = "AT LIGHT SPEED";
            } else {
                speed = 150; // Normal speed
                btn.classList.remove('accel-active');
                btn.innerText = "Accelerate";
            }
            
            if (interval) {
                clearInterval(interval);
                interval = setInterval(updateStreams, speed);
            }
        }
    </script>
</body>
</html>

    <div class="status-bar" id="status">STATUS: IDLE_STANDBY</div>

    <script>
        // High-precision seeds for the 3-Gen logic
        const piStr = "31415926535897932384626433832795";
        const eStr  = "27182818284590452353602874713526"; 
        let index = 0;
        let running = false;

        function startDrill() {
            if (running) return;
            running = true;

            const box = document.getElementById('display');
            const btn = document.getElementById('drill-btn');
            const status = document.getElementById('status');

            btn.style.display = 'none';
            status.innerText = "STATUS: ACTIVE_DRILLING_9Q_STREAM";

            // Main Execution Loop: 60ms total cycle
            setInterval(() => {
                // STEP 1: Flush (The 2-adic peel / clear previous state)
                box.style.opacity = "0";
                box.classList.remove('snap');

                // STEP 2: Inference (Alternating step between Pi and e)
                setTimeout(() => {
                    // Logic: Even indices = Pi, Odd indices = e
                    if (index % 2 === 0) {
                        box.innerText = piStr[Math.floor(index / 2) % piStr.length];
                    } else {
                        box.innerText = eStr[Math.floor(index / 2) % eStr.length];
                    }
                    
                    // STEP 3: Snap (Speed of light output/flash)
                    box.style.opacity = "1";
                    box.classList.add('snap');
                    
                    index++;
                }, 25); // 25ms delay creates the 'snap' feel

            }, 60); // 60ms cycle simulates high-speed hardware processing
        }
    </script>

</body>
</html>
