<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background: #111; color: #0f0; }
        .ticker-wrap {
            width: 100%; overflow: hidden; background: #222; 
            padding: 20px 0; border-top: 2px solid #0f0; border-bottom: 2px solid #0f0;
        }
        .ticker {
            display: inline-block; white-space: nowrap;
            animation: marquee 30s linear infinite;
        }
        .ticker:hover { animation-play-state: paused; cursor: help; }
        .digit { font-size: 2rem; padding: 0 5px; position: relative; }
        .digit:hover::after {
            content: attr(data-source);
            position: absolute; top: -30px; left: 0;
            background: #fff; color: #000; font-size: 0.8rem;
            padding: 2px 5px; border-radius: 3px; white-space: nowrap;
        }
        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        .sources { margin-top: 20px; color: #888; font-size: 0.9rem; text-align: center; }
        a { color: #0f0; }
    </style>
</head>
<body>

<h2 style="text-align:center;">Three Generation Inference Ticker</h2>

<div class="ticker-wrap">
    <div class="ticker" id="ticker-content">
        </div>
</div>

<div class="sources">
    Sources for Verification: 
    <a href="https://www.piday.org/pi-calculator/" target="_blank">Pi (NASA/PiDay)</a> | 
    <a href="https://apod.nasa.gov/htmltest/gifcity/e.2million" target="_blank">Euler's Number (NASA)</a>
</div>

<script>
    const pi = "3141592653";
    const e = "2718281828";
    const content = document.getElementById('ticker-content');
    
    // Create the alternating sequence
    for(let i=0; i < pi.length; i++) {
        const spanPi = document.createElement('span');
        spanPi.className = 'digit';
        spanPi.innerText = pi[i];
        spanPi.setAttribute('data-source', `Pi Digit ${i+1}`);
        
        const spanE = document.createElement('span');
        spanE.className = 'digit';
        spanE.innerText = e[i];
        spanE.setAttribute('data-source', `E Digit ${i+1}`);
        
        content.appendChild(spanPi);
        content.appendChild(spanE);
    }
</script>
</body>
</html>
