<!DOCTYPE html>
<html>
<head>
    <title>Project NP: Adelic Inference Engine</title>
    <style>
        body { background: #0a0a0a; color: #00ff41; font-family: 'Courier New', monospace; padding: 20px; }
        #console { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; height: 300px; overflow-y: scroll; border: 1px solid #333; padding: 10px; }
        .controls { margin-top: 20px; display: flex; align-items: center; gap: 20px; }
        button { background: #ff4141; color: white; border: none; padding: 15px 30px; cursor: pointer; font-weight: bold; border-radius: 5px; }
        button:hover { background: #d40000; }
        .status { color: #888; font-size: 0.8em; }
    </style>
</head>
<body>
    <h2>Singularity Scale: 10Q (Inference on 16 Exponent)</h2>
    
    <div id="console">
        <div id="pi-stream"><strong>Signal (&pi;):</strong> <br></div>
        <div id="e-stream"><strong>Decipher (e):</strong> <br></div>
    </div>

    <div class="controls">
        <button id="stop-btn">STOP INFERENCE</button>
        <div class="status">
            Residue R: <span id="residue">0</span> | 
            Phase: <span id="phase">0.00i</span> | 
            Mode: Marilyn Fold (Universal)
        </div>
    </div>

    <script>
        let running = true;
        const piOut = document.getElementById('pi-stream');
        const eOut = document.getElementById('e-stream');
        const resOut = document.getElementById('residue');
        const stopBtn = document.getElementById('stop-btn');

        // Hypothetical Adelic Generator
        // We use a spigot-style algorithm to "pop out" the digits
        function* generatePi() { /* Spigot implementation for Pi */ }
        function* generateE() { /* Spigot implementation for E */ }

        const piGen = generatePi();
        const eGen = generateE();

        function pursuit() {
            if (!running) return;

            // Extract the next "Residue" from the infinite sequence
            const pBit = piGen.next().value;
            const eBit = eGen.next().value;

            piOut.innerText += pBit;
            eOut.innerText += eBit;

            // Simulate the 2-adic noise cancellation
            resOut.innerText = (Math.random() > 0.95) ? "1" : "0"; 

            // Scroll to bottom to keep pursuit visible
            const consoleBox = document.getElementById('console');
            consoleBox.scrollTop = consoleBox.scrollHeight;

            setTimeout(pursuit, 50); // Speed of the Mobius rotation
        }

        stopBtn.addEventListener('click', () => {
            running = false;
            stopBtn.innerText = "INFERENCE FROZEN";
            stopBtn.style.background = "#555";
            console.log("Singularity Baseline Locked at 10Q.");
        });

        pursuit();
    </script>
</body>
</html>
