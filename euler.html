<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consensus Filter | Convergence Instrument</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background: #000;
    color: #00ff41;
    font-family: 'Courier New', monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.dashboard {
    width: 90%;
    max-width: 600px;
    padding: 20px;
    background: #050505;
    border: 1px solid #222;
}

.header {
    text-align: center;
    font-size: 0.8rem;
    color: #666;
    margin-bottom: 15px;
    letter-spacing: 2px;
}

#cycle-count {
    text-align: center;
    font-size: 0.8rem;
    color: #777;
}

#main-state {
    text-align: center;
    font-size: 3rem;
    margin: 20px 0;
    letter-spacing: 5px;
    color: #333;
}

.status {
    text-align: center;
    margin-bottom: 15px;
    font-size: 0.9rem;
    color: #888;
}

.residue-ring {
    display: flex;
    justify-content: space-around;
    margin: 30px 0;
}

.gate {
    text-align: center;
}

.circle {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    border: 2px solid #333;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    transition: all 0.2s ease;
}

.label {
    margin-top: 8px;
    font-size: 0.7rem;
    color: #777;
}

.circle.active {
    border-color: #00ff41;
    box-shadow: 0 0 15px #00ff41;
}

.circle.locked {
    border-color: #ff0055;
    box-shadow: 0 0 20px #ff0055;
    color: #ff0055;
}

.controls {
    text-align: center;
    margin-top: 20px;
}

button {
    background: none;
    border: 1px solid #00ff41;
    color: #00ff41;
    padding: 10px 20px;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 2px;
}

button:hover {
    background: #00ff41;
    color: #000;
}

button:disabled {
    border-color: #333;
    color: #333;
}
</style>
</head>

<body>

<div class="dashboard">
    <div class="header">TRIPLE-MODULI CONSENSUS SIEVE (5, 7, 53)</div>

    <div id="cycle-count">CYCLES: 0</div>
    <div id="main-state">00000000</div>
    <div class="status" id="status">READY</div>

    <div class="residue-ring">
        <div class="gate" id="gate-5">
            <div class="circle"><span id="val-5">-</span></div>
            <div class="label">MOD 5</div>
        </div>

        <div class="gate" id="gate-7">
            <div class="circle"><span id="val-7">-</span></div>
            <div class="label">MOD 7</div>
        </div>

        <div class="gate" id="gate-53">
            <div class="circle"><span id="val-53">-</span></div>
            <div class="label">MOD 53</div>
        </div>
    </div>

    <div class="controls">
        <button id="btn-start" onclick="startDrill()">ENGAGE FILTER</button>
    </div>
</div>

<script>
let interval;
let N = 1;
let cycles = 0;

const ENGINE_LIMIT = 9999991;

function updateGate(id, value) {
    const el = document.querySelector(`#${id} .circle`);
    el.classList.remove('active');

    if (value === 0) {
        el.classList.add('active');
    }
}

function updateStatus(m5, m7, m53) {
    let score = (m5 === 0) + (m7 === 0) + (m53 === 0);
    const status = document.getElementById('status');

    if (score === 0) status.innerText = "SEARCHING";
    else if (score === 1) status.innerText = "ALIGNING";
    else if (score === 2) status.innerText = "NEAR LOCK";
    else status.innerText = "LOCKED";
}

function startDrill() {
    document.getElementById('btn-start').disabled = true;
    document.getElementById('btn-start').innerText = "RUNNING";

    const stateDisplay = document.getElementById('main-state');
    const cCount = document.getElementById('cycle-count');

    interval = setInterval(() => {

        N = (271 * N + 314) % ENGINE_LIMIT;
        cycles++;

        let mod5 = N % 5;
        let mod7 = N % 7;
        let mod53 = N % 53;

        stateDisplay.innerText = N.toString().padStart(8, '0');
        cCount.innerText = "CYCLES: " + cycles;

        document.getElementById('val-5').innerText = mod5;
        document.getElementById('val-7').innerText = mod7;
        document.getElementById('val-53').innerText = mod53;

        updateGate('gate-5', mod5);
        updateGate('gate-7', mod7);
        updateGate('gate-53', mod53);

        updateStatus(mod5, mod7, mod53);

        if (mod5 === 0 && mod7 === 0 && mod53 === 0) {
            clearInterval(interval);
            triggerSnap(cycles);
        }

    }, 5);
}

function triggerSnap(finalCycles) {
    document.body.style.background = "#050000";

    document.querySelectorAll('.circle').forEach(c => {
        c.classList.remove('active');
        c.classList.add('locked');
    });

    document.getElementById('main-state').style.color = "#ff0055";
    document.getElementById('main-state').style.textShadow = "0 0 20px #ff0055";

    document.getElementById('status').innerText = "LOCK ACHIEVED";
    document.getElementById('cycle-count').innerText = "LOCKED AT: " + finalCycles;
}
</script>

</body>
</html>
